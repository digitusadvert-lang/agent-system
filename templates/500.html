{% extends "base.html" %}

{% block page_title %}Server Error{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-body text-center p-5">
                    <h1 class="mb-3" style="font-size:56px;font-weight:800;color:#1e2a3b;">500</h1>
                    <h4 class="mb-3">Something Went Wrong</h4>
                    <p class="text-muted mb-4">The server hit an unexpected error while processing the request.</p>
                    {% if current_user.is_authenticated %}
                    <a href="{{ url_for('admin_dashboard' if current_user.role == 'admin' else 'agent_dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
                    {% else %}
                    <a href="{{ url_for('login') }}" class="btn btn-primary">Back to Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
