{% extends "base.html" %}

{% block login_content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h4 class="text-center fw-700 mb-1" style="font-weight:700;color:#1e2a3b">Welcome Back</h4>
        <p class="text-center text-muted mb-4" style="font-size:13.5px">Sign in to Agent Management System</p>

        <form method="POST" id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius:8px 0 0 8px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#94a3b8">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" class="form-control" name="username"
                           placeholder="Enter username" required
                           style="border-left:0;border-radius:0 8px 8px 0">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius:8px 0 0 8px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#94a3b8">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" name="password"
                           placeholder="Enter password" required
                           style="border-left:0;border-radius:0 8px 8px 0">
                </div>
            </div>
            <input type="hidden" name="fp" id="fp_login">
            <button type="submit" class="btn btn-primary w-100 py-2" style="font-size:14px">
                <i class="fas fa-sign-in-alt me-2"></i> Sign In
            </button>
        </form>

        <div class="text-center mt-4 pt-3" style="border-top:1px solid #f1f5f9">
            <a href="{{ url_for('forgot_password') }}" style="font-size:13px;color:#6366f1;text-decoration:none">
                <i class="fas fa-key me-1"></i> Forgot Password?
            </a>
        </div>
    </div>
</div>
{% block scripts %}
<script>
    function getDeviceId() {
        var KEY = 'wtp_device_id';
        var id = null;
        try { id = localStorage.getItem(KEY); } catch(e) {}
        if (!id) {
            // Generate UUID v4
            id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
            try { localStorage.setItem(KEY, id); } catch(e) {}
        }
        // Write to cookie as server-side backup
        document.cookie = 'fp=' + id + '; path=/; SameSite=Strict; max-age=31536000';
        return id;
    }
    document.getElementById('fp_login').value = getDeviceId();
</script>
{% endblock %}
{% endblock login_content %}
